resources:
  jobs:
    energy_mix_orchestration:
      name: "Energy Mix Orchestration"
      description: "Fetches GB actual generation per production type from ENTSO-E and runs the medallion pipeline."

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: landing_schema
          default: ${var.landing_schema}
        - name: ingest_offset_days
          default: "2353"

      tasks:
        - task_key: ingest_actual_generation
          description: "Call ENTSO-E REST API, parse A75 XML, write CSV to UC Volume"
          spark_python_task:
            python_file: ../../src/energy_mix/ingestion/entsoe_generation_ingest.py
            parameters:
              - "{{job.parameters.catalog}}"
              - "{{job.parameters.landing_schema}}"
              - "{{job.parameters.ingest_offset_days}}"
          environment_key: default

        - task_key: pipeline_update
          description: "Run the ENTSO-E generation medallion pipeline (Bronze → Silver + DQ)"
          depends_on:
            - task_key: ingest_actual_generation
          pipeline_task:
            pipeline_id: ${resources.pipelines.energy_mix.id}

      environments:
        - environment_key: default
          spec:
            environment_version: "3"
            dependencies:
              - requests

      schedule:
        quartz_cron_expression: "0 30 13 * * ?"
        timezone_id: "UTC"

      # Uncomment and set var.notification_email to enable job-failure alerts.
      # email_notifications:
      #   on_failure:
      #     - ${var.notification_email}
