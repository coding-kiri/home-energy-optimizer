resources:
  jobs:
    dq_consolidator:
      name: "DQ Consolidator"
      description: "Single-writer monitoring job. Auto-discovers <name>_event_log tables and merges expectation metrics into dq_expectation_history."

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: monitoring_schema
          default: ${var.monitoring_schema}

      tasks:
        - task_key: consolidate_run_health
          description: "Discover *_event_log tables and incrementally MERGE expectation metrics"
          spark_python_task:
            python_file: ../../src/monitoring/dq_consolidate.py
            parameters:
              - "{{job.parameters.catalog}}"
              - "{{job.parameters.monitoring_schema}}"
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "3"

      # Runs after the daily batch window (pipeline jobs trigger earlier, e.g. 13:30 UTC).
      schedule:
        quartz_cron_expression: "0 0 14 * * ?"
        timezone_id: "UTC"
        pause_status: PAUSED

      # Uncomment and set var.notification_email to enable job-failure alerts.
      # email_notifications:
      #   on_failure:
      #     - ${var.notification_email}
