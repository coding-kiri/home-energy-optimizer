bundle:
  name: home-energy-optimizer

include:
  - resources/**/*.yml

variables:
  catalog:
    description: Unity Catalog catalog name
    default: home-energy-optimizer-dev
  landing_schema:
    description: Schema that holds raw UC Volumes (landing zone)
    default: landing_zone
  bronze_schema:
    description: Schema for bronze-layer Delta tables
    default: bronze_layer
  silver_schema:
    description: Schema for silver-layer Delta tables
    default: silver_layer
  monitoring_schema:
    description: Schema for pipeline event log and DQ tables (dq_expectation_history, fact_data_quality; no dedicated monitoring bucket)
    default: silver_layer
  notification_email:
    description: Email address for job failure notifications
    default: ""
  service_principal_id:
    description: "Service principal ID"
    default: ""

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-9718c6fe-0da9.cloud.databricks.com
      profile: home-energy-optimizer-dev
      root_path: ~/bundles/${bundle.name}/${bundle.target}
    variables:
      catalog: home-energy-optimizer-dev

  prod:
    mode: production
    workspace:
      host: https://dbc-9718c6fe-0da9.cloud.databricks.com
      root_path: ~/bundles/${bundle.name}/${bundle.target}
    run_as:
      service_principal_name: 0f26eb41-a037-4eb4-9e47-d344d651cadf
    variables:
      service_principal_id: 0f26eb41-a037-4eb4-9e47-d344d651cadf
      catalog: home-energy-optimizer-prod